<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Schede — Italian Flashcards</title>
<style>
  :root{
    --paper: #F2ECE2;
    --card: #FAF7F0;
    --ink: #2B2A28;
    --ink-soft: #6B6760;
    --rule: #D9D0BE;
    --terracotta: #B5563A;
    --olive: #5C6B47;
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body{
    margin:0;
    padding:0;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
  }

  body{
    background-image: radial-gradient(circle at 1px 1px, rgba(43,42,40,0.035) 1px, transparent 0);
    background-size: 20px 20px;
  }

  .wrap{
    max-width: 560px;
    margin: 0 auto;
    padding: 22px 18px 50px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header{
    display:flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 26px;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 14px;
  }

  .wordmark{
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 21px;
    font-weight: 700;
    letter-spacing: 0.3px;
    cursor: pointer;
  }
  .wordmark span{ color: var(--terracotta); }

  .settings-row{
    display: flex;
    gap: 10px;
  }
  .settings-row select{
    font-family: inherit;
    font-size: 12.5px;
    color: var(--ink);
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 3px;
    padding: 6px 8px;
    flex: 1;
  }

  /* ---------- generic screen layout ---------- */
  .screen{
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .hidden-view{ display: none; }

  .back-row{
    display:flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 22px;
  }
  .back-btn{
    font-size: 13px;
    color: var(--ink-soft);
    cursor: pointer;
  }
  .back-btn:hover{ color: var(--terracotta); }
  .screen-label{
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-soft);
  }

  /* ---------- choice screens (big tap targets) ---------- */
  .choice-stage{
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 14px;
  }

  .choice-btn{
    display: block;
    width: 100%;
    text-align: left;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 24px 20px;
    cursor: pointer;
    font-family: inherit;
  }
  .choice-btn:active{ transform: scale(0.99); }
  .choice-btn .title{
    font-family: Georgia, serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
  }
  .choice-btn .sub{
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 4px;
  }

  /* ---------- category list ---------- */
  .cat-list{
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .cat-row{
    display:flex;
    align-items: center;
    justify-content: space-between;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 3px;
    padding: 14px 16px;
    cursor: pointer;
  }
  .cat-row:active{ transform: scale(0.995); }
  .cat-row .name{ font-size: 15px; font-weight: 600; }
  .cat-row .count{ font-size: 12px; color: var(--ink-soft); }

  /* ---------- flashcard ---------- */
  .stage{
    flex: 1;
    display:flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
  }

  .counter{
    font-size: 12.5px;
    color: var(--ink-soft);
    letter-spacing: 0.4px;
  }

  .card{
    position: relative;
    width: 100%;
    max-width: 440px;
    min-height: 240px;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 3px;
    box-shadow: 0 1px 0 rgba(43,42,40,0.04), 0 10px 24px -12px rgba(43,42,40,0.25);
    padding: 30px 24px;
    display:flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 18px;
    cursor: pointer;
    user-select: none;
  }

  .italian{
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 32px;
    font-weight: 700;
    line-height: 1.25;
  }

  /* English shown as the lead/front face (English-first mode) */
  .english-front{
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 28px;
    font-weight: 700;
    line-height: 1.3;
  }

  /* Italian shown as the revealed/back face (English-first mode) */
  .italian-back{
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--terracotta);
    min-height: 24px;
  }
  .italian-back.hidden{ visibility: hidden; }

  .english{
    font-size: 17px;
    color: var(--ink-soft);
    min-height: 24px;
  }
  .english.hidden{ visibility: hidden; }

  .tap-hint{
    font-size: 11.5px;
    color: var(--ink-soft);
    letter-spacing: 0.3px;
  }

  /* volume icon: no popup, just plays audio */
  .volume-btn{
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: 1px solid var(--rule);
    background: var(--paper);
    display:flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--ink);
  }
  .volume-btn svg{ width: 19px; height: 19px; }
  .volume-btn:active{ transform: scale(0.95); }

  /* Prev/Next: primary navigation, always available */
  .nav-row{
    display:flex;
    gap: 10px;
    width: 100%;
    max-width: 440px;
  }
  .nav-btn{
    flex: 1;
    padding: 14px 8px;
    border-radius: 3px;
    border: 1px solid var(--ink);
    background: var(--ink);
    color: var(--paper);
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.2px;
  }
  .nav-btn:disabled{
    opacity: 0.35;
    cursor: default;
  }

  /* Got it / Didn't know it: optional, secondary, doesn't gate navigation */
  .grade-row{
    display:flex;
    gap: 10px;
    width: 100%;
    max-width: 440px;
  }
  .grade-row.optional{
    margin-top: -6px;
  }
  .grade-btn{
    flex: 1;
    padding: 11px 8px;
    border-radius: 3px;
    border: 1px solid var(--rule);
    background: transparent;
    font-family: inherit;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--ink-soft);
    cursor: pointer;
  }
  .grade-btn.miss{ border-color: var(--rule); }
  .grade-btn.got{ border-color: var(--rule); }
  .grade-btn.miss:hover{ border-color: var(--terracotta); color: var(--terracotta); }
  .grade-btn.got:hover{ border-color: var(--olive); color: var(--olive); }
  .grade-btn.chosen.miss{ border-color: var(--terracotta); color: var(--terracotta); background: rgba(181,86,58,0.08); }
  .grade-btn.chosen.got{ border-color: var(--olive); color: var(--olive); background: rgba(92,107,71,0.08); }

  .done-state{
    text-align: center;
    color: var(--ink-soft);
    font-size: 15px;
    padding: 30px 10px;
  }
  .done-state .big{
    font-family: Georgia, serif;
    font-size: 21px;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .reset-link{
    margin-top: 16px;
    display:inline-block;
    font-size: 13px;
    color: var(--terracotta);
    cursor: pointer;
    text-decoration: underline;
  }

  footer{
    text-align: center;
    font-size: 11.5px;
    color: var(--ink-soft);
    margin-top: 30px;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="wordmark" id="homeLink">sched<span>e</span>.</div>
    <div class="settings-row">
      <select id="profileSelect">
        <option value="profile1">Profile 1</option>
        <option value="profile2">Profile 2</option>
      </select>
      <select id="directionSelect">
        <option value="it-first">Italian → English</option>
        <option value="en-first">English → Italian</option>
      </select>
    </div>
  </header>

  <!-- SCREEN 1: Vocabulary / Sentences -->
  <div id="screenSection" class="screen">
    <div class="choice-stage">
      <button class="choice-btn" id="btnVocab">
        <div class="title">Vocabulary</div>
        <div class="sub">Single words — family, body, food, weather, and more</div>
      </button>
      <button class="choice-btn" id="btnSentences">
        <div class="title">Sentences</div>
        <div class="sub">Full phrases you'll actually say — restaurants, hotels, getting around</div>
      </button>
    </div>
  </div>

  <!-- SCREEN 2: Random / Choose a category -->
  <div id="screenMode" class="screen hidden-view">
    <div class="back-row">
      <span class="back-btn" id="backToSection">← back</span>
      <span class="screen-label" id="modeLabel"></span>
    </div>
    <div class="choice-stage">
      <button class="choice-btn" id="btnRandom">
        <div class="title">Random</div>
        <div class="sub">Shuffled mix from everything in this section</div>
      </button>
      <button class="choice-btn" id="btnChooseCat">
        <div class="title">Choose a category</div>
        <div class="sub">Pick a specific topic to study</div>
      </button>
    </div>
  </div>

  <!-- SCREEN 3: Category list -->
  <div id="screenCatList" class="screen hidden-view">
    <div class="back-row">
      <span class="back-btn" id="backToMode">← back</span>
      <span class="screen-label" id="catListLabel"></span>
    </div>
    <div class="cat-list" id="catListContainer"></div>
  </div>

  <!-- SCREEN 4: Flashcard study -->
  <div id="screenStudy" class="screen hidden-view">
    <div class="back-row">
      <span class="back-btn" id="backFromStudy">← back</span>
      <span class="screen-label" id="studyLabel"></span>
    </div>
    <div class="stage" id="stage"></div>
  </div>

  <footer>no streaks, no levels, no notifications — just the words.</footer>
</div>

tivali","en":"Boots","cat":"Clothing & beach","id":242},{"it":"I sandali","en":"Sandals","cat":"Clothing & beach","id":243},{"it":"Il costume da bagno","en":"Swimsuit","cat":"Clothing & beach","id":244},{"it":"La spiaggia","en":"Beach","cat":"Clothing & beach","id":245},{"it":"L'asciugamano","en":"Towel","cat":"Clothing & beach","id":246},{"it":"L'ombrellone","en":"Beach umbrella","cat":"Clothing & beach","id":247},{"it":"Il tempo","en":"Weather","cat":"Weather","id":248},{"it":"La pioggia","en":"Rain","cat":"Weather","id":249},{"it":"Piove","en":"It's raining","cat":"Weather","id":250},{"it":"La nuvola","en":"Cloud","cat":"Weather","id":251},{"it":"Nuvoloso","en":"Cloudy","cat":"Weather","id":252},{"it":"Il sole","en":"Sun","cat":"Weather","id":253},{"it":"Soleggiato","en":"Sunny","cat":"Weather","id":254},{"it":"Il vento","en":"Wind","cat":"Weather","id":255},{"it":"Caldo","en":"Hot","cat":"Weather","id":256},{"it":"Freddo","en":"Cold","cat":"Weather","id":257},{"it":"Il cellulare","en":"Cell phone","cat":"Phone & communication","id":258},{"it":"Internet","en":"Internet","cat":"Phone & communication","id":259},{"it":"Il messaggio","en":"Text message","cat":"Phone & communication","id":260},{"it":"La telefonata","en":"Phone call","cat":"Phone & communication","id":261},{"it":"Il caricatore","en":"Charger","cat":"Phone & communication","id":262},{"it":"La batteria","en":"Battery","cat":"Phone & communication","id":263},{"it":"Il Wi-Fi","en":"Wi-Fi","cat":"Phone & communication","id":264},{"it":"Il segnale","en":"Signal","cat":"Phone & communication","id":265},{"it":"Il treno","en":"Train","cat":"Transportation","id":266},{"it":"L'autobus","en":"Bus","cat":"Transportation","id":267},{"it":"La macchina","en":"Car","cat":"Transportation","id":268},{"it":"Lo scooter","en":"Scooter","cat":"Transportation","id":269},{"it":"A piedi","en":"Walking / on foot","cat":"Transportation","id":270},{"it":"Il taxi","en":"Taxi","cat":"Transportation","id":271},{"it":"L'aereo","en":"Airplane","cat":"Transportation","id":272},{"it":"L'aeroporto","en":"Airport","cat":"Transportation","id":273},{"it":"Il volo","en":"Flight","cat":"Transportation","id":274},{"it":"Il bagaglio","en":"Luggage","cat":"Transportation","id":275},{"it":"La valigia","en":"Suitcase","cat":"Transportation","id":276},{"it":"La strada","en":"Road / street","cat":"Street & navigation","id":277},{"it":"Il marciapiede","en":"Sidewalk","cat":"Street & navigation","id":278},{"it":"Il segnale di stop","en":"Stop sign","cat":"Street & navigation","id":279},{"it":"Il semaforo","en":"Traffic light","cat":"Street & navigation","id":280},{"it":"L'incrocio","en":"Intersection","cat":"Street & navigation","id":281},{"it":"La piazza","en":"Square (town square)","cat":"Street & navigation","id":282},{"it":"Il mare","en":"Sea","cat":"Street & navigation","id":283},{"it":"La collina","en":"Hill","cat":"Street & navigation","id":284},{"it":"La spazzatura","en":"Trash","cat":"Street & navigation","id":285},{"it":"Avanti","en":"Forward","cat":"Street & navigation","id":286},{"it":"Indietro","en":"Backward","cat":"Street & navigation","id":287},{"it":"Gira a sinistra","en":"Turn left","cat":"Street & navigation","id":288},{"it":"Gira a destra","en":"Turn right","cat":"Street & navigation","id":289}];

  const PHRASE_CATS = ["Greetings & basics","At the restaurant","Hotel / lodging","Getting around","Shopping","Emergencies / health"];
  const VOCAB_CATS = ["Pronouns","Family","Body parts","Tableware / dining objects","Food & drink","Numbers","Time / clock","Days of the week","Directions / position words","Colors","Hotel room","Clothing & beach","Weather","Phone & communication","Transportation","Street & navigation"];

  // ---------- Profile / storage ----------
  const profileSelect = document.getElementById('profileSelect');
  let currentProfile = localStorage.getItem('schede_active_profile') || 'profile1';
  profileSelect.value = currentProfile;

  function storageKey(profile){ return 'schede_progress_' + profile; }
  function loadProgress(profile){
    try{
      const raw = localStorage.getItem(storageKey(profile));
      return raw ? JSON.parse(raw) : {};
    }catch(e){ return {}; }
  }
  function saveProgress(profile, prog){
    localStorage.setItem(storageKey(profile), JSON.stringify(prog));
  }
  let progress = loadProgress(currentProfile);

  profileSelect.addEventListener('change', () => {
    currentProfile = profileSelect.value;
    localStorage.setItem('schede_active_profile', currentProfile);
    progress = loadProgress(currentProfile);
    direction = loadDirection(currentProfile);
    directionSelect.value = direction;
    goToSection();
  });

  // ---------- Direction (Italian-first vs English-first), per profile ----------
  const directionSelect = document.getElementById('directionSelect');
  function directionKey(profile){ return 'schede_direction_' + profile; }
  function loadDirection(profile){
    return localStorage.getItem(directionKey(profile)) || 'it-first';
  }
  function saveDirection(profile, dir){
    localStorage.setItem(directionKey(profile), dir);
  }
  let direction = loadDirection(currentProfile);
  directionSelect.value = direction;

  directionSelect.addEventListener('change', () => {
    direction = directionSelect.value;
    saveDirection(currentProfile, direction);
  });

  // ---------- Spaced repetition ----------
  const BOX_INTERVALS_DAYS = [0, 1, 4, 9, 21];
  function getCardState(id){ return progress[id] || { box: 0, dueAt: 0 }; }
  function gradeCard(id, grade){
    const state = getCardState(id);
    let box = state.box;
    if(grade === 'miss') box = 0;
    else if(grade === 'got') box = Math.min(box + 1, BOX_INTERVALS_DAYS.length - 1);
    const days = BOX_INTERVALS_DAYS[box];
    const dueAt = Date.now() + days * 24 * 60 * 60 * 1000;
    progress[id] = { box, dueAt };
    saveProgress(currentProfile, progress);
  }

  // ---------- Audio ----------
  let italianVoice = null;
  function pickVoice(){
    const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
    italianVoice = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('it')) || null;
  }
  if('speechSynthesis' in window){
    pickVoice();
    window.speechSynthesis.onvoiceschanged = pickVoice;
  }
  function speakItalian(text){
    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'it-IT';
    if(italianVoice) utter.voice = italianVoice;
    utter.rate = 0.92;
    window.speechSynthesis.speak(utter);
  }

  // ---------- Screen elements ----------
  const screenSection = document.getElementById('screenSection');
  const screenMode = document.getElementById('screenMode');
  const screenCatList = document.getElementById('screenCatList');
  const screenStudy = document.getElementById('screenStudy');
  const ALL_SCREENS = [screenSection, screenMode, screenCatList, screenStudy];

  function showScreen(screen){
    ALL_SCREENS.forEach(s => s.classList.add('hidden-view'));
    screen.classList.remove('hidden-view');
  }

  // ---------- Navigation state ----------
  let currentSection = null; // 'vocab' | 'sentences'

  function goToSection(){
    currentSection = null;
    showScreen(screenSection);
  }

  document.getElementById('homeLink').addEventListener('click', goToSection);

  document.getElementById('btnVocab').addEventListener('click', () => {
    currentSection = 'vocab';
    enterMode();
  });
  document.getElementById('btnSentences').addEventListener('click', () => {
    currentSection = 'sentences';
    enterMode();
  });

  function enterMode(){
    document.getElementById('modeLabel').textContent = currentSection === 'vocab' ? 'Vocabulary' : 'Sentences';
    showScreen(screenMode);
  }
  document.getElementById('backToSection').addEventListener('click', goToSection);

  document.getElementById('btnRandom').addEventListener('click', () => {
    startStudy(null); // null category = whole section, shuffled
  });
  document.getElementById('btnChooseCat').addEventListener('click', () => {
    enterCatList();
  });

  function enterCatList(){
    document.getElementById('catListLabel').textContent = currentSection === 'vocab' ? 'Vocabulary' : 'Sentences';
    const cats = currentSection === 'vocab' ? VOCAB_CATS : PHRASE_CATS;
    const container = document.getElementById('catListContainer');
    container.innerHTML = cats.map(cat => {
      const count = DECK.filter(c => c.cat === cat).length;
      return `<div class="cat-row" data-cat="${cat.replace(/"/g,'&quot;')}">
        <span class="name">${cat}</span>
        <span class="count">${count} cards</span>
      </div>`;
    }).join('');
    container.querySelectorAll('.cat-row').forEach(row => {
      row.addEventListener('click', () => startStudy(row.dataset.cat));
    });
    showScreen(screenCatList);
  }
  document.getElementById('backToMode').addEventListener('click', enterMode);
  document.getElementById('backFromStudy').addEventListener('click', () => {
    showScreen(screenMode);
  });

  // ---------- Study session ----------
  let queue = [];
  let currentIndex = 0;
  let revealed = false;
  let sessionLabel = '';

  function startStudy(cat){
    const sectionCats = currentSection === 'vocab' ? VOCAB_CATS : PHRASE_CATS;
    let pool;
    if(cat){
      pool = DECK.filter(c => c.cat === cat);
      sessionLabel = cat;
    } else {
      pool = DECK.filter(c => sectionCats.includes(c.cat));
      sessionLabel = (currentSection === 'vocab' ? 'Vocabulary' : 'Sentences') + ' — random';
    }
    queue = pool.slice();
    for(let i = queue.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [queue[i], queue[j]] = [queue[j], queue[i]];
    }
    currentIndex = 0;
    revealed = false;
    document.getElementById('studyLabel').textContent = sessionLabel;
    showScreen(screenStudy);
    renderCard();
  }

  const stage = document.getElementById('stage');

  function renderCard(){
    if(currentIndex >= queue.length){
      renderDone();
      return;
    }
    const card = queue[currentIndex];
    const position = currentIndex + 1;

    const itFirst = direction === 'it-first';
    const frontText = itFirst ? card.it : card.en;
    const backText = itFirst ? card.en : card.it;
    const frontClass = itFirst ? 'italian' : 'english-front';
    const backClass = itFirst ? 'english' : 'italian-back';

    const isFirst = currentIndex === 0;

    stage.innerHTML = `
      <div class="counter">${position} of ${queue.length}</div>
      <div class="card" id="flashcard">
        <button class="volume-btn" id="volumeBtn" aria-label="Play pronunciation" title="Play pronunciation">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
          </svg>
        </button>
        <div class="${frontClass}" id="frontWord">${frontText}</div>
        <div class="${backClass} ${revealed ? '' : 'hidden'}" id="backWord">${backText}</div>
        ${!revealed ? '<div class="tap-hint">tap card to reveal</div>' : ''}
      </div>

      <div class="nav-row">
        <button class="nav-btn" id="prevBtn" ${isFirst ? 'disabled' : ''}>← Prev</button>
        <button class="nav-btn" id="nextBtn">Next →</button>
      </div>

      <div class="grade-row optional">
        <button class="grade-btn miss" data-grade="miss">Didn't know it</button>
        <button class="grade-btn got" data-grade="got">Got it</button>
      </div>
    `;

    // tapping the card (but not the volume button) reveals
    document.getElementById('flashcard').addEventListener('click', (e) => {
      if(e.target.closest('#volumeBtn')) return;
      if(!revealed){ revealed = true; renderCard(); }
    });

    // volume button: always speaks Italian, no popup, no other effect
    document.getElementById('volumeBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      speakItalian(card.it);
    });

    // Prev / Next: primary navigation, never blocked, always available
    document.getElementById('prevBtn').addEventListener('click', () => {
      if(currentIndex > 0){
        currentIndex--;
        revealed = false;
        renderCard();
      }
    });
    document.getElementById('nextBtn').addEventListener('click', () => {
      currentIndex++;
      revealed = false;
      renderCard();
    });

    // Grading: optional, secondary. Records progress but does NOT advance the card.
    document.querySelectorAll('.grade-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        gradeCard(card.id, btn.dataset.grade);
        btn.classList.add('chosen');
        const sibling = btn.parentElement.querySelector(`.grade-btn:not([data-grade="${btn.dataset.grade}"])`);
        if(sibling) sibling.classList.remove('chosen');
      });
    });
  }

  function renderDone(){
    stage.innerHTML = `
      <div class="done-state">
        <div class="big">That's everything.</div>
        <div>You went through ${queue.length} card${queue.length===1?'':'s'}.</div>
        <span class="reset-link" id="restartLink">go again</span>
      </div>
    `;
    document.getElementById('restartLink').addEventListener('click', () => {
      for(let i = queue.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [queue[i], queue[j]] = [queue[j], queue[i]];
      }
      currentIndex = 0;
      revealed = false;
      renderCard();
    });
  }

  // ---------- Init ----------
  goToSection();

})();
</script>
